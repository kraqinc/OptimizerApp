name: Smart Build OptimizerApp

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Detect Gradle tasks
        run: ./gradlew tasks --all

      - name: Smart build fallback
        run: |
          echo "Trying build options..."

          ./gradlew assembleDebug || \
          ./gradlew :app:assembleDebug || \
          ./gradlew build || \
          ./gradlew assemble || \
          (echo "❌ No valid Gradle task found" && exit 1)

      - name: Find APK
        run: find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OptimizerApp-APK
          path: |
            **/outputs/apk/**/*.apk
            **/*.apk
